<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Company registration, TIN, licensing, work permits, NGO registration, statutory filing, and annual returns. We handle it all from registration to compliance, Tanzania." />
    <meta name="keywords" content="Exxonim Consult, business advisory, Tanzania, company registration, compliance, licensing, tax support" />
    <meta name="author" content="Exxonim Consult" />
    <meta property="og:title" content="Business Setup, Compliance & Permits Tanzania | Exxonim Consult" />
    <meta property="og:description" content="From registration to compliance. Company setup, TIN, licensing, work permits, NGO registration, and annual returns, all under one roof." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Exxonim Consult" />
    <meta property="og:url" content="https://exxonim.tz" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@exxonim" />
    <title>Business Setup, Compliance & Permits Tanzania | Exxonim Consult</title>

    <!-- Blocking script: read saved theme from localStorage and set data-theme
         BEFORE first paint, preventing a flash of the wrong theme.
         This ensures the correct logo shows instantly (CSS uses html[data-theme]
         for logo visibility — no React dependency). -->
    <script>
      (function(){try{var t=localStorage.getItem('exxonim-theme')||localStorage.getItem('koro-theme');if(t==='light'||t==='dark'){document.documentElement.dataset.theme=t}}catch(e){}})()
    </script>

    <!-- Preload only hero background for LCP (other images lazy-load) -->
    <link rel="preload" as="image" href="/hero-bg.webp" fetchPriority="high" />

    <!-- Favicons (light for light OS theme, dark for dark OS theme) -->
    <link rel="icon" type="image/png" href="/branding/exxonim-favicon-light.png" id="favicon-light" />
    <link rel="icon" type="image/png" href="/branding/exxonim-favicon-dark.png" media="(prefers-color-scheme: dark)" id="favicon-dark" />
    <link rel="apple-touch-icon" href="/branding/exxonim-favicon-light.png" />

    <!-- RSS auto-discovery -->
    <link rel="alternate" type="application/rss+xml" title="Exxonim Consult Blog" href="/blog/rss.xml" />

    <!-- Google Fonts: loaded async (no preconnect, no preload — minimal blocking) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&display=swap" /></noscript>

    <!-- Pre-React shell: theme tokens + minimal styles
         These CSS custom properties allow the correct theme background
         to render instantly BEFORE Vite's CSS bundle loads. -->
    <style>
      :root {
        --color-page: #F5F5EE;
        --color-text: #102529;
        --color-text-muted: rgba(16, 37, 41, 0.72);
        --color-accent-soft: rgba(15, 92, 99, 0.12);
        --color-hero-bg: #edf0eb;
        --color-surface: #FAFAF7;
        --color-border-soft: rgba(15, 92, 99, 0.12);
      }
      html[data-theme="dark"] {
        --color-page: #111d20;
        --color-text: #d6e5e1;
        --color-text-muted: rgba(214, 229, 225, 0.72);
        --color-accent-soft: rgba(127, 188, 193, 0.14);
        --color-hero-bg: #131f23;
        --color-surface: #1a2f34;
        --color-border-soft: rgba(127, 188, 193, 0.20);
      }

      .sk-logo-light { opacity: 1; }
      .sk-logo-dark  { opacity: 0; position: absolute; top: 0; left: 0; }
      html[data-theme="dark"] .sk-logo-light { opacity: 0; }
      html[data-theme="dark"] .sk-logo-dark  { opacity: 1; }

      /* ── Boot / Emergency Loader ─────────────────────
       * CSS-only loader shown between HTML parse and React mount.
       * Automatically disappears when React renders into #root.
       * Only visible when JS fails to load or startup is slow.
       *
       * Visual: Pulsing Exxonim favicon + "Loading" + animated dots
       * Duration: Shows for as long as React hasn't mounted
       * Timeout: After 8s, fades to subtle "Taking longer than expected" message
       */
      @keyframes boot-pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.9; }
      }
      @keyframes boot-dot {
        0%, 20% { opacity: 0; }
        40% { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes boot-fade-in {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: var(--color-page);
        animation: boot-fade-in 0.3s ease forwards;
        transition: opacity 0.25s ease, visibility 0.25s ease;
      }
      .boot-loader--hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .boot-loader__favicon {
        position: relative;
        width: 3rem;
        height: 3rem;
        animation: boot-pulse 2s ease-in-out infinite;
      }
      .boot-loader__favicon img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .boot-loader__text {
        display: flex;
        align-items: center;
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 0.8125rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--color-text-muted);
        opacity: 0.5;
      }
      .boot-loader__dots {
        display: inline-flex;
        margin-left: 1px;
      }
      .boot-loader__dots span {
        animation: boot-dot 1.4s ease-in-out infinite;
        opacity: 0;
      }
      .boot-loader__dots span:nth-child(1) { animation-delay: 0s; }
      .boot-loader__dots span:nth-child(2) { animation-delay: 0.2s; }
      .boot-loader__dots span:nth-child(3) { animation-delay: 0.4s; }
      .boot-loader__timeout {
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 0.6875rem;
        color: var(--color-text-muted);
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      .boot-loader--timeout .boot-loader__timeout {
        opacity: 0.6;
      }
    </style>
  </head>
  <body class="antialiased bg-page text-text font-sans" style="background-color:var(--color-page);overflow:hidden">
    <div id="root" style="background-color:var(--color-page)">
    </div>
    <!-- Boot / Emergency Loader: CSS-only overlay that covers the page
         until React mounts AND the first page content renders.
         Stays on top of the shell (nav+footer) during chunk download.
         Fades out smoothly when React signals readiness. -->
    <div class="boot-loader" id="boot-loader">
      <div class="boot-loader__favicon">
        <img src="/branding/exxonim-favicon-light.png" alt="" class="sk-logo-light" />
        <img src="/branding/exxonim-favicon-dark.png" alt="" class="sk-logo-dark" />
      </div>
      <div class="boot-loader__text">
        <span>Loading</span>
        <span class="boot-loader__dots" aria-hidden="true">
          <span>.</span><span>.</span><span>.</span>
        </span>
      </div>
      <p class="boot-loader__timeout">Taking longer than expected</p>
    </div>
    <!-- Timeout: show message after 10 seconds if React still hasn't mounted.
         Auto-reload after 20 seconds — only as a last resort for dead HMR
         connections. Only reloads once (tracked via sessionStorage). -->
    <script>
      (function(){
        var t=setTimeout(function(){
          var l=document.getElementById('boot-loader');
          if(l)l.classList.add('boot-loader--timeout');
        },10000);
        window.__bootLoaderTimer=t;
        // Self-heal: if React still hasn't dismissed the boot loader after 20s,
        // the page is stuck (dead HMR, stale connection, etc.) — reload once.
        setTimeout(function(){
          if(document.getElementById('boot-loader')){
            try{
              var n=parseInt(sessionStorage.getItem('__bootReload')||'0',10);
              if(n<1){
                sessionStorage.setItem('__bootReload',String(n+1));
                window.location.reload();
              }
            }catch(e){ window.location.reload(); }
          }
        },20000);
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
