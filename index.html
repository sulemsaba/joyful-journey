<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Exxonim Consult helps organizations move through registration, licensing, and regulatory follow-through with a clearer process and fewer avoidable delays." />
    <meta name="keywords" content="Exxonim Consult, business advisory, Tanzania, company registration, compliance, licensing, tax support" />
    <meta name="author" content="Exxonim Consult" />
    <meta property="og:title" content="Business Registration & Compliance Tanzania | Exxonim Consult" />
    <meta property="og:description" content="Registration, licensing, and practical compliance support for businesses, NGOs, and institutions." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Exxonim Consult" />
    <meta property="og:url" content="https://exxonim.tz" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@exxonim" />
    <title>Business Registration & Compliance Tanzania | Exxonim Consult</title>

    <!-- Blocking script: read saved theme from localStorage and set data-theme
         BEFORE first paint, preventing a flash of the wrong theme.
         This ensures the correct logo shows instantly (CSS uses html[data-theme]
         for logo visibility — no React dependency). -->
    <script>
      (function(){try{var t=localStorage.getItem('exxonim-theme')||localStorage.getItem('koro-theme');if(t==='light'||t==='dark'){document.documentElement.dataset.theme=t}}catch(e){}})()
    </script>

    <!-- Preload hero background image for LCP -->
    <link rel="preload" as="image" href="/hero-bg.webp" fetchPriority="high" />

    <!-- Appearance-aware favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/branding/exxonim-favicon-light.png" id="favicon-light" />
    <link rel="icon" type="image/png" sizes="32x32" href="/branding/exxonim-favicon-dark.png" media="(prefers-color-scheme: dark)" id="favicon-dark" />

    <!-- RSS auto-discovery -->
    <link rel="alternate" type="application/rss+xml" title="Exxonim Consult Blog" href="/blog/rss.xml" />

    <!-- Google Fonts: Geist Sans + Geist Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- ═══ Skeleton Rule: inline critical styles for pre-React shell ═══
         These CSS custom properties and animations allow the skeleton to
         render instantly with the correct theme, BEFORE Vite's CSS bundle
         loads. When React hydrates and replaces #root content, these
         styles remain in <head> but become unused — zero runtime cost. -->
    <style>
      /* ── Theme tokens for skeleton (duplicated from globals.css) ── */
      :root {
        --color-page: #F5F5EE;
        --color-text: #102529;
        --color-text-muted: rgba(16, 37, 41, 0.72);
        --color-accent-soft: rgba(15, 92, 99, 0.12);
        --color-accent-soft-strong: rgba(15, 92, 99, 0.22);
        --color-hero-bg: #edf0eb;
        --color-surface: #FAFAF7;
        --color-border-soft: rgba(15, 92, 99, 0.12);
      }
      html[data-theme="dark"] {
        --color-page: #111d20;
        --color-text: #d6e5e1;
        --color-text-muted: rgba(214, 229, 225, 0.72);
        --color-accent-soft: rgba(127, 188, 193, 0.14);
        --color-accent-soft-strong: rgba(127, 188, 193, 0.28);
        --color-hero-bg: #131f23;
        --color-surface: #1a2f34;
        --color-border-soft: rgba(127, 188, 193, 0.20);
      }

      /* ── Logo theme visibility ── */
      .sk-logo-light { opacity: 1; }
      .sk-logo-dark  { opacity: 0; position: absolute; top: 0; left: 0; }
      html[data-theme="dark"] .sk-logo-light { opacity: 0; }
      html[data-theme="dark"] .sk-logo-dark  { opacity: 1; }

      /* ── Keyframe animations ── */
      @keyframes sk-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%      { transform: scale(1.12); opacity: 0.8; }
      }
      @keyframes sk-dot {
        0%, 20%  { opacity: 0; }
        40%, 100% { opacity: 1; }
      }

      /* ── Skeleton-specific styles ── */
      .sk-header {
        position: fixed; top: 0; left: 0; right: 0; z-index: 50;
        height: 60px;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 1rem;
        background: var(--color-hero-bg);
      }
      @media (min-width: 640px) {
        .sk-header { height: 68px; padding: 0 1.5rem; }
      }

      .sk-hero {
        height: 94.5svh;
        height: 94.5dvh;
        max-height: 600px;
        margin-top: 60px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: var(--color-hero-bg);
      }
      @media (min-width: 640px) {
        .sk-hero { max-height: none; margin-top: 68px; }
      }

      .sk-review-bar {
        height: 5.5svh;
        min-height: 48px;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        background: var(--color-page);
      }

      .sk-pill {
        border-radius: 9999px;
        background: var(--color-accent-soft);
      }
      .sk-pill-strong {
        border-radius: 9999px;
        background: var(--color-accent-soft-strong);
      }
      .sk-logo-area {
        position: relative;
        width: 140px; height: 32px;
      }
      @media (min-width: 640px) {
        .sk-logo-area { width: 160px; height: 36px; }
      }
    </style>
  </head>
  <body class="antialiased bg-page text-text font-sans">
    <div id="root">
      <!-- ═══ Skeleton Rule: inline skeleton shell ═══
           Shows the SHAPE of what's coming while real content loads.
           NOT a full-screen blocker — it's inline, part of page flow.
           React replaces #root content on hydrate → skeleton auto-hides. -->

      <!-- Header bar placeholder -->
      <header class="sk-header" aria-hidden="true">
        <!-- Faded logo area (left) -->
        <div class="sk-logo-area sk-pill" style="display:flex;align-items:center;gap:8px;">
          <img src="/branding/exxonim-favicon-light.png" alt="" class="sk-logo-light" style="width:28px;height:28px;object-fit:contain;" />
          <img src="/branding/exxonim-favicon-dark.png" alt="" class="sk-logo-dark" style="width:28px;height:28px;object-fit:contain;" />
          <div style="width:80px;height:14px;border-radius:4px;background:var(--color-accent-soft-strong);"></div>
        </div>
        <!-- Faded nav pills (right) -->
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="sk-pill" style="width:48px;height:8px;"></div>
          <div class="sk-pill" style="width:56px;height:8px;"></div>
          <div class="sk-pill" style="width:44px;height:8px;"></div>
          <div class="sk-pill-strong" style="width:64px;height:28px;"></div>
        </div>
      </header>

      <!-- Hero section placeholder -->
      <div class="sk-hero" aria-hidden="true">
        <!-- Favicon pulse loader -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
          <div style="animation:sk-pulse 2s ease-in-out infinite;">
            <img src="/branding/exxonim-favicon-light.png" alt="" class="sk-logo-light" style="width:48px;height:48px;object-fit:contain;" />
            <img src="/branding/exxonim-favicon-dark.png" alt="" class="sk-logo-dark" style="width:48px;height:48px;object-fit:contain;" />
          </div>
          <!-- "Loading..." with animated dots -->
          <div style="display:flex;align-items:baseline;gap:2px;font-family:Geist,sans-serif;font-size:14px;color:var(--color-text-muted);letter-spacing:0.02em;">
            <span>Loading</span>
            <span style="animation:sk-dot 1.4s ease-in-out infinite;"><span style="opacity:0;">.</span></span>
            <span style="animation:sk-dot 1.4s ease-in-out 0.2s infinite;"><span style="opacity:0;">.</span></span>
            <span style="animation:sk-dot 1.4s ease-in-out 0.4s infinite;"><span style="opacity:0;">.</span></span>
          </div>
        </div>
      </div>

      <!-- Review bar placeholder -->
      <div class="sk-review-bar" aria-hidden="true">
        <div class="sk-pill" style="width:24px;height:8px;"></div>
        <div class="sk-pill" style="width:40px;height:8px;"></div>
        <div class="sk-pill" style="width:32px;height:8px;"></div>
        <div class="sk-pill" style="width:60px;height:8px;"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
