<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exxonim – Aurora</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #ffffff; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// Exxonim Aurora Animation — Generated by Exxonim Engine
// Config: {"speed":0.9,"spacing":2.5,"coverage":75,"intensity":52,"accentHue":140,"showDepth":true,"colorShift":true}

var cfg = {
  "speed": 0.9,
  "spacing": 2.5,
  "coverage": 75,
  "intensity": 52,
  "accentHue": 140,
  "showDepth": true,
  "colorShift": true
};

function draw(ctx, w, h, t, cfg) {
  var zoneH = h * (cfg.coverage / 100);
  var zoneTop = (h - zoneH) / 2;
  var rawCurtainCount = Math.max(2, Math.round(zoneH / (cfg.spacing * 3)));
  var curtainCount = Math.max(2, Math.min(rawCurtainCount, 25));
  var steps = w < 768 ? 80 : 160;
  for (var c = 0; c < curtainCount; c++) {
    var nC = curtainCount > 1 ? c / (curtainCount - 1) : 0.5;
    var dF = 1 - Math.abs(nC - 0.5) * 2;
    var hue = cfg.accentHue + nC * 160 + Math.sin(t * 0.1 + nC) * 40;
    var hueShift = cfg.colorShift ? Math.sin(t * 0.18 + nC * 0.6) * 30 : 0;
    var alpha = 0.06 + dF * 0.3;
    var baseY = zoneTop + nC * zoneH;
    var curtainHeight = zoneH * (0.25 + cfg.intensity * 0.006);
    var waveSpeed = t * (0.2 + nC * 0.3);
    var subLines = cfg.showDepth ? 4 : 2;
    for (var sub = 0; sub < subLines; sub++) {
      var subAlpha = alpha * (1 - Math.abs(sub / subLines - 0.5) * 1.5);
      if (subAlpha <= 0) continue;
      ctx.globalAlpha = subAlpha;
      ctx.strokeStyle = cfg.colorShift ? "hsl(" + (hue + hueShift + sub * 5) + ", " + (60 + dF * 40) + "%, " + (50 + dF * 35) + "%)" : "#88ffaa";
      ctx.lineWidth = cfg.showDepth ? 1 + dF * 3 : 2;
      ctx.beginPath();
      for (var s = 0; s <= steps; s++) {
        var x = (s / steps) * (w + 200) - 100;
        var xP = s / steps;
        var wave1 = Math.sin(xP * Math.PI * 1.5 + waveSpeed) * 60 * (1 + cfg.intensity * 0.02);
        var wave2 = Math.sin(xP * Math.PI * 3 + waveSpeed * 1.3) * 25;
        var droop = Math.sin(xP * Math.PI) * curtainHeight * 0.3;
        var y = baseY + wave1 + wave2 + droop + (sub - subLines / 2) * 8;
        if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }
}

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var time = 0, lastFrame = 0;

function resize() {
  var dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

function animate(ts) {
  if (lastFrame === 0) lastFrame = ts;
  var delta = Math.min(ts - lastFrame, 50);
  lastFrame = ts;
  time += (delta / 1000) * cfg.speed * 0.5;
  ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  draw(ctx, window.innerWidth, window.innerHeight, time, cfg);
  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
