<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exxonim – Dynamic 3D Ribbon Engine</title>

<style>
:root {
  --bg: #F5F5EE;
  --text: #111625;
  --line-color: #0a2f21;          /* deep navy green */
  --glass-bg: rgba(255, 255, 255, 0.85);
  --glass-border: rgba(15, 23, 42, 0.08);
}

body.dark-theme {
  --bg: #090a0f;
  --text: #f8fafc;
  --line-color: #ffffff;          /* pure white */
  --glass-bg: rgba(18, 20, 28, 0.7);
  --glass-border: rgba(255, 255, 255, 0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  background: var(--bg);
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  transition: background-color 0.3s ease;
  position: relative;
}

/* Full-screen canvas */
canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* Floating glass card on the left */
.glass-card {
  position: absolute;
  top: 50%;
  left: 5vw;
  transform: translateY(-50%);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  padding: 3rem;
  border-radius: 24px;
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.05);
  max-width: 450px;
  z-index: 10;
  color: var(--text);
}

.glass-card h1 {
  font-size: clamp(2.2rem, 3.5vw, 3.5rem);
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 12px;
  letter-spacing: -0.04em;
}

.glass-card p {
  font-size: 1.05rem;
  opacity: 0.8;
  line-height: 1.6;
  margin-bottom: 24px;
}

.theme-btn {
  background: var(--text);
  color: var(--bg);
  border: none;
  padding: 14px 28px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: transform 0.2s ease;
}

.theme-btn:active {
  transform: scale(0.96);
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="glass-card">
  <h1>Exxonim Engine</h1>
  <p>A fluid, multidimensional ribbon utilizing 2D spatial distortion to break linear patterns and create organic depth.</p>
  <button class="theme-btn" id="theme-toggle">
    <span id="btn-icon">🌙</span> <span>Toggle Theme</span>
  </button>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const themeToggle = document.getElementById("theme-toggle");
const btnIcon = document.getElementById("btn-icon");

let w, h, dpr;
let t = 0;

// ---- Unpredictable motion drivers ----
function driverA(time) {
  return Math.sin(time * 0.31 + 0.7) * 0.7 +
         Math.cos(time * 0.53) * 0.5 +
         Math.sin(time * 0.17) * 0.4;
}
function driverB(time) {
  return Math.cos(time * 0.41 + 1.1) * 0.65 +
         Math.sin(time * 0.59) * 0.45 +
         Math.cos(time * 0.13) * 0.5;
}

// ---- High-DPI resize (canvas covers whole window) ----
function resize() {
  dpr = window.devicePixelRatio || 1;
  w = canvas.width = window.innerWidth * dpr;
  h = canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);
resize();

function draw() {
  const cssW = window.innerWidth;
  const cssH = window.innerHeight;
  ctx.clearRect(0, 0, cssW, cssH);

  const lineColor = getComputedStyle(document.documentElement).getPropertyValue('--line-color').trim();
  
  // Depth illusion via transparency
  ctx.globalAlpha = 0.4; 
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 1.2;

  // Ribbon setup
  const lineCount = 40; 
  const spacingY = 2.5; 
  const ribbonCenterY = cssH / 2;

  // Organic Drivers for shape morphing
  const twistStrength = 90 + driverA(t * 0.5) * 40; 
  const waveCycles = 1.2 + driverB(t * 0.3) * 0.3; 

  for (let i = 0; i < lineCount; i++) {
    const baseY = ribbonCenterY + (i - lineCount / 2) * spacingY;
    
    const steps = 250; 
    const drawWidth = cssW + 300; 
    const stepSizeX = drawWidth / steps;

    ctx.beginPath();
    for (let s = 0; s <= steps; s++) {
      const x = (s * stepSizeX) - 150; 
      const xProgress = s / steps;

      // 2D FIELD DISPLACEMENT
      // Curvature ensures the waves are strongest in the middle and pinch at the edges
      const curvature = Math.sin(xProgress * Math.PI) * twistStrength;
      
      // The wave calculation depends on X (xProgress), time (t), AND the line index (i)
      const wave = Math.sin(xProgress * waveCycles * Math.PI + (t * 1.5) + (i * 0.1)) * curvature;
      
      // A gentle, slow sway to give the entire ribbon vertical lift
      const sway = Math.sin(t * 0.5 + xProgress) * 30;

      const y = baseY + wave + sway;

      if (s === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Slow time increment for fluid, non-frantic motion
  t += 0.003; 
  requestAnimationFrame(draw);
}

// Theme toggle logic
themeToggle.addEventListener("click", () => {
  document.body.classList.toggle("dark-theme");
  const isDark = document.body.classList.contains("dark-theme");
  btnIcon.innerText = isDark ? "☀️" : "🌙";
});

// Initialize animation
draw();
</script>

</body>
</html>
