<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Icon: Red Cross emblem -->
  <g transform="translate(8, 6)">
    <!-- Circle background -->
    <circle cx="24" cy="24" r="22" fill="none" stroke="#DC2626" stroke-width="2.5"/>
    <!-- Cross -->
    <rect x="19" y="8" width="10" height="32" rx="1.5" fill="#DC2626"/>
    <rect x="8" y="19" width="32" height="10" rx="1.5" fill="#DC2626"/>
    <!-- Inner white ring for depth -->
    <circle cx="24" cy="24" r="17" fill="none" stroke="#FEE2E2" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Text: TRCS -->
  <text x="62" y="39" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="2.5" fill="#1E293B">
    <tspan fill="#DC2626">TR</tspan><tspan fill="#1E293B">CS</tspan>
  </text>
</svg>