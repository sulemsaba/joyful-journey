    <!-- Abstract growth bars -->
    <rect x="4" y="32" width="8" height="12" rx="1.5" fill="#BBF7D0"/>
    <rect x="15" y="24" width="8" height="20" rx="1.5" fill="#86EFAC"/>
    <rect x="26" y="14" width="8" height="30" rx="1.5" fill="#4ADE80"/>
