<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="utec-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>
  <!-- Icon: Abstract circuit/tech node -->
  <g transform="translate(8, 8)">
    <!-- Outer hexagon -->
    <polygon points="22,2 40,12 40,32 22,42 4,32 4,12" fill="none" stroke="url(#utec-grad)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Inner circuit lines -->
    <circle cx="22" cy="22" r="5" fill="url(#utec-grad)"/>
    <line x1="22" y1="17" x2="22" y2="8" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round"/>
    <line x1="27" y1="22" x2="36" y2="22" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="27" x2="22" y2="36" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round"/>
    <line x1="17" y1="22" x2="8" y2="22" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
    <!-- Corner dots -->
    <circle cx="22" cy="8" r="2.5" fill="#0EA5E9"/>
    <circle cx="36" cy="22" r="2.5" fill="#0D9488"/>
    <circle cx="22" cy="36" r="2.5" fill="#0EA5E9"/>
    <circle cx="8" cy="22" r="2.5" fill="#0D9488"/>
  </g>
  <!-- Text: UTEC -->
  <text x="58" y="39" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="3" fill="#0F172A">
    <tspan fill="#0EA5E9">U</tspan><tspan fill="#0F172A">TEC</tspan>
  </text>
</svg>